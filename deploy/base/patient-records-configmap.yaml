apiVersion: v1
kind: ConfigMap
metadata:
  name: patient-records-api
data:
  api.py: |
    import json, http.server

    PATIENTS = {
        "1": {"id": "1", "name": "Ada Lovelace",  "age": 36, "condition": "stable"},
        "2": {"id": "2", "name": "Alan Turing",    "age": 41, "condition": "critical"},
        "3": {"id": "3", "name": "Grace Hopper",   "age": 85, "condition": "discharged"},
    }

    class Handler(http.server.BaseHTTPRequestHandler):
        def log_message(self, *a): pass

        def send_json(self, code, data):
            body = json.dumps(data).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", len(body))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path == "/patients":
                return self.send_json(200, list(PATIENTS.values()))
            if self.path.startswith("/patients/"):
                pid = self.path.split("/")[-1]
                p = PATIENTS.get(pid)
                return self.send_json(200 if p else 404, p or {"error": "not found"})
            if self.path == "/healthz":
                return self.send_json(200, {"status": "ok"})
            self.send_json(404, {"error": "not found"})

    if __name__ == "__main__":
        http.server.HTTPServer(("0.0.0.0", 80), Handler).serve_forever()
